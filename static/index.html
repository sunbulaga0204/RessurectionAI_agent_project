<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Resurrection Agent</title>
    <link href="style.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 selection:text-primary">

<!-- TopNavBar -->
<header class="bg-[#121317]/80 backdrop-blur-xl text-[#e9c349] font-['Noto_Serif'] text-lg tracking-tight docked full-width top-0 z-50 sticky shadow-[0_4px_30px_rgba(227,226,232,0.05)] flex justify-between items-center w-full px-6 md:px-12 py-4">
    <div class="flex items-center gap-4 md:gap-8">
        <!-- Mobile Sidebar Toggle -->
        <button id="btn-mobile-menu" class="md:hidden text-secondary hover:text-primary transition-colors">
            <span class="material-symbols-outlined" data-icon="menu">menu</span>
        </button>
        <span class="text-xl md:text-2xl font-bold text-[#e9c349] tracking-tighter">Resurrection Agent</span>
    </div>
    
    <div class="flex items-center gap-4">
        <div class="hidden md:flex bg-surface-container-lowest px-3 py-1 rounded-full items-center gap-2 border border-outline-variant/15">
            <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
            <span class="text-[0.6875rem] font-medium tracking-widest uppercase text-secondary" id="sources-badge">Ready</span>
        </div>
        <div class="flex items-center gap-3">
            <button class="hover:text-[#e9c349] transition-colors duration-300 scale-95 ease-in-out" id="btn-about" title="About">
                <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
            </button>
        </div>
    </div>
</header>

<div class="flex min-h-[calc(100vh-70px)]">

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

    <!-- SideNavBar -->
    <aside id="sidebar" class="bg-[#121317] font-['Inter'] text-sm font-medium w-80 fixed left-0 top-0 bottom-0 bg-gradient-to-r from-[#1b1d23] to-[#121317] flex flex-col border-r border-[#e3e2e8]/15 z-40 pt-20 transition-transform duration-300 -translate-x-full md:translate-x-0 h-full overflow-y-auto overflow-x-hidden">
        
        <div class="px-6 py-8 border-b border-outline-variant/10">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest overflow-hidden border border-primary/20 text-2xl">
                    🎭
                </div>
                <div>
                    <h2 class="text-xl font-['Noto_Serif'] text-[#c9c6c0]" id="persona-name">Loading...</h2>
                    <p class="text-[0.6875rem] uppercase tracking-widest opacity-60" id="persona-era"></p>
                </div>
            </div>
            <button id="btn-new-session" class="w-full py-3 bg-primary text-on-primary rounded-xl font-bold tracking-tight hover:brightness-110 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                New Research Session
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <div class="px-2 mb-2">
                <span class="text-[0.6rem] uppercase tracking-[0.2em] text-secondary opacity-40 font-bold">The Archive</span>
            </div>
            
            <a class="flex items-center gap-3 px-3 py-2 bg-[#1b1d23] text-[#e9c349] rounded-r-xl border-l-4 border-[#e9c349] translate-x-1 duration-300" href="#">
                <span class="material-symbols-outlined" data-icon="library_books">library_books</span>
                <span>Active Session</span>
            </a>

            <!-- Placeholder for active indices, hidden for now -->
            <div class="mt-8 px-2 mb-2 hidden">
                <span class="text-[0.6rem] uppercase tracking-[0.2em] text-secondary opacity-40 font-bold">Active Indices</span>
            </div>
        </nav>

        <div class="p-4 border-t border-outline-variant/15 flex flex-col gap-2">
            <button id="btn-export-sidebar" class="w-full flex items-center gap-3 px-3 py-2 text-[#c9c6c0] opacity-70 hover:opacity-100 transition-all text-xs uppercase tracking-widest text-left">
                <span class="material-symbols-outlined text-sm" data-icon="description">description</span>
                Export Markdown
            </button>
        </div>
    </aside>

    <!-- Main Content Area (Chat Canvas) -->
    <main class="flex-1 w-full md:ml-80 pb-40 pt-8 relative flex flex-col items-center overflow-y-auto" id="chat-scroller">
        <div class="w-full max-w-3xl px-4 md:px-8 space-y-12" id="chat-area">
            <!-- Messages injected here via JS -->
        </div>
    </main>

    <!-- Bottom Interaction Area -->
    <div class="fixed bottom-0 left-0 md:left-80 right-0 bg-gradient-to-t from-surface via-surface/95 to-transparent pt-12 pb-6 px-4 md:px-12 z-30">
        <div class="max-w-3xl mx-auto space-y-4">
            <!-- Research Inquiry Chips (injected dynamically via JS inside welcome card or here) -->
            
            <!-- Input Area -->
            <div class="relative group mt-4">
                <textarea 
                    id="user-input" 
                    class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 py-4 px-6 pr-16 text-on-surface placeholder:text-secondary/40 font-headline transition-all bg-opacity-80 backdrop-blur-md rounded-t-xl resize-none overflow-hidden" 
                    placeholder="Inquire of the archive..." 
                    rows="1"
                ></textarea>
                <div class="absolute right-4 bottom-3 flex items-center gap-2">
                    <button id="btn-send" class="text-primary p-2 hover:bg-primary/10 rounded-full transition-all disabled:opacity-50">
                        <span class="material-symbols-outlined" data-icon="send">send</span>
                    </button>
                </div>
            </div>
             <p class="text-[0.6rem] uppercase tracking-[0.2em] text-center text-secondary opacity-40 mt-1">AI reconstruction. Verify with sources. | Created by Anggi Azzuhri</p>
        </div>
    </div>
</div>

<!-- Floating Action Menu (Mobile/Desktop Quick Actions) -->
<div class="fixed bottom-24 right-4 md:bottom-8 md:right-8 flex flex-col gap-3 z-50">
    <button id="btn-export" class="w-12 h-12 md:w-14 md:h-14 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-110 active:scale-95 group relative" title="Export">
        <span class="material-symbols-outlined text-xl md:text-2xl" data-icon="download">download</span>
        <div class="absolute bottom-full right-0 mb-4 bg-surface-container-highest text-on-surface text-[0.6rem] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap uppercase tracking-widest border border-primary/20 hidden md:block">
            Export Session
        </div>
    </button>
</div>

<!-- About Panel Modal (Hidden by default) -->
<div id="about-panel" class="fixed inset-0 bg-black/80 z-[100] backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4">
    <div class="bg-surface-container-high border border-outline-variant/20 rounded-2xl p-8 max-w-lg w-full relative">
        <button id="btn-close-about" class="absolute top-4 right-4 text-secondary hover:text-primary">
            <span class="material-symbols-outlined" data-icon="close">close</span>
        </button>
        <h2 id="about-name" class="text-2xl font-headline text-primary mb-1"></h2>
        <p id="about-meta" class="text-sm text-secondary uppercase tracking-wider mb-6"></p>
        <p id="about-bio" class="text-secondary/90 leading-relaxed mb-6"></p>
        <div id="about-works" class="mb-6"></div>
        <p id="about-disclaimer" class="text-xs text-secondary/50 italic"></p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
